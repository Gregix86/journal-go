{{define "content"}}
<h1>{{.CategoryName}}</h1>
{{if .CategoryDescription}}<p class="hint" style="margin-top:-0.6rem;">{{.CategoryDescription}}</p>{{end}}

<div class="ledger">
  {{range .Entries}}
  <a class="ledger-row" href="/entree/{{.Slug}}" style="color:inherit;text-decoration:none;">
    <span class="ledger-num mono">{{pad3 .Number}}</span>
    <span class="ledger-body">
      {{if .IsPrivate}}<span class="private-flag">Prive</span>{{end}}
      <h2>{{.Title}}</h2>
      <p>{{.Excerpt}}</p>
    </span>
    <span class="ledger-meta">{{dateFR .CreatedAt}}</span>
  </a>
  {{else}}
  <p class="hint">Rien ici pour le moment.</p>
  {{end}}
</div>
{{end}}
